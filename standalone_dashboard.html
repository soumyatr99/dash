<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Command Dashboard - Portable</title>
    
    <!-- Scripts: React, Babel, Tailwind, Recharts, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #05070a;
            color: white;
            overflow: hidden;
            margin: 0;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-dark {
            background: rgba(10, 13, 20, 0.8);
            backdrop-filter: blur(30px);
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .text-glow-blue {
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dashboard: {
                            bg: '#05070a',
                            panel: '#0a0d14',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
            PieChart, Pie, Cell, LineChart, Line, Legend, BarChart, Bar 
        } = Recharts;

        // --- Data ---
        const DIST_DATA = [
            { d: "Ganjam", alc: 12, mt: 1500, yt: 18000, conf: 726, upl: 1050 },
            { d: "Khurda", alc: 10, mt: 1400, yt: 16800, conf: 650, upl: 980 },
            { d: "Cuttack", alc: 8, mt: 1200, yt: 14400, conf: 580, upl: 850 },
            { d: "Keonjhar", alc: 7, mt: 1000, yt: 12000, conf: 484, upl: 720 },
            { d: "Balasore", alc: 6, mt: 950, yt: 11400, conf: 420, upl: 650 },
            { d: "Bhadrak", alc: 5, mt: 800, yt: 9600, conf: 380, upl: 580 },
            { d: "Jajpur", alc: 6, mt: 900, yt: 10800, conf: 410, upl: 620 },
            { d: "Puri", alc: 5, mt: 850, yt: 10200, conf: 390, upl: 600 },
            { d: "Mayurbhanj", alc: 8, mt: 1100, yt: 13200, conf: 450, upl: 700 },
            { d: "Sundargarh", alc: 7, mt: 1050, yt: 12600, conf: 430, upl: 680 },
            { d: "Angul", alc: 5, mt: 800, yt: 9600, conf: 320, upl: 500 },
            { d: "Dhenkanal", alc: 4, mt: 750, yt: 9000, conf: 290, upl: 450 },
            { d: "Sambalpur", alc: 5, mt: 850, yt: 10200, conf: 340, upl: 520 },
            { d: "Bargarh", alc: 5, mt: 800, yt: 9600, conf: 310, upl: 480 },
            { d: "Bolangir", alc: 4, mt: 700, yt: 8400, conf: 260, upl: 400 },
            { d: "Kalahandi", alc: 4, mt: 750, yt: 9000, conf: 280, upl: 430 },
            { d: "Koraput", alc: 3, mt: 600, yt: 7200, conf: 210, upl: 350 },
            { d: "Rayagada", alc: 3, mt: 550, yt: 6600, conf: 190, upl: 320 },
            { d: "Nabarangpur", alc: 2, mt: 450, yt: 5400, conf: 150, upl: 280 },
            { d: "Malkangiri", alc: 2, mt: 400, yt: 4800, conf: 120, upl: 250 },
            { d: "Kandhamal", alc: 2, mt: 400, yt: 4800, conf: 130, upl: 260 },
            { d: "Boudh", alc: 2, mt: 350, yt: 4200, conf: 110, upl: 220 },
            { d: "Nayagarh", alc: 4, mt: 650, yt: 7800, conf: 240, upl: 380 },
            { d: "Jagatsinghpur", alc: 4, mt: 700, yt: 8400, conf: 270, upl: 410 },
            { d: "Kendrapara", alc: 4, mt: 750, yt: 9000, conf: 290, upl: 440 },
            { d: "Gajapati", alc: 2, mt: 350, yt: 4200, conf: 100, upl: 200 },
            { d: "Nuapada", alc: 2, mt: 350, yt: 4200, conf: 110, upl: 210 },
            { d: "Subarnapur", alc: 2, mt: 350, yt: 4200, conf: 120, upl: 230 },
            { d: "Jharsuguda", alc: 3, mt: 500, yt: 6000, conf: 180, upl: 300 },
            { d: "Deogarh", alc: 1, mt: 250, yt: 3000, conf: 80, upl: 150 }
        ];

        const ALC_DATA = [
            { id: "ALC-001", name: "Central Hub", type: "Main", status: "Active", efficiency: 94 },
            { id: "ALC-002", name: "North Wing", type: "Satellite", status: "Active", efficiency: 88 },
            { id: "ALC-003", name: "South Port", type: "Satellite", status: "Maintenance", efficiency: 45 },
            { id: "ALC-004", name: "East Gate", type: "Main", status: "Active", efficiency: 91 },
            { id: "ALC-005", name: "West Terminal", type: "Satellite", status: "Active", efficiency: 82 },
        ];

        const TREND_DATA = [
            { day: 'Mon', confirmed: 450, target: 500 },
            { day: 'Tue', confirmed: 520, target: 500 },
            { day: 'Wed', confirmed: 480, target: 500 },
            { day: 'Thu', confirmed: 610, target: 500 },
            { day: 'Fri', confirmed: 580, target: 500 },
            { day: 'Sat', confirmed: 420, target: 500 },
            { day: 'Sun', confirmed: 390, target: 500 },
        ];

        const COLORS = {
            excellent: '#10b981',
            onTrack: '#f59e0b',
            moderate: '#f97316',
            critical: '#ef4444',
            primary: '#3b82f6',
        };

        // --- Components ---

        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const StatCard = ({ label, value, subValue, iconName, trend, colorClass }) => (
            <div className="glass p-6 xl:p-8 2xl:p-12 rounded-3xl flex flex-col justify-between h-full group hover:bg-white/10 transition-all duration-500">
                <div className="flex justify-between items-start">
                    <div className="p-3 xl:p-4 2xl:p-6 rounded-2xl bg-white/5">
                        <Icon name={iconName} className={`w-6 h-6 xl:w-8 xl:h-8 2xl:w-12 2xl:h-12 ${colorClass}`} />
                    </div>
                    {trend && (
                        <div className={`flex items-center gap-1 px-3 py-1 rounded-full text-xs xl:text-sm font-bold ${trend > 0 ? "bg-emerald-500/20 text-emerald-400" : "bg-rose-500/20 text-rose-400"}`}>
                            {trend > 0 ? <Icon name="arrow-up-right" className="w-3 h-3" /> : <Icon name="arrow-down-right" className="w-3 h-3" />}
                            {Math.abs(trend)}%
                        </div>
                    )}
                </div>
                <div className="mt-6">
                    <p className="text-white/50 text-xs xl:text-sm font-medium uppercase tracking-widest">{label}</p>
                    <h3 className="text-2xl xl:text-4xl 2xl:text-6xl font-black mt-2 text-glow">{value}</h3>
                    {subValue && <p className="text-white/30 text-xs xl:text-sm mt-2 font-mono">{subValue}</p>}
                </div>
            </div>
        );

        const App = () => {
            const [activeSection, setActiveSection] = useState(0);
            const [isAutoRotating, setIsAutoRotating] = useState(true);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [progress, setProgress] = useState(0);

            const sections = [
                { id: 'overview', label: 'Overview', icon: 'layout-dashboard' },
                { id: 'performance', label: 'Performance', icon: 'bar-chart-3' },
                { id: 'datagrid', label: 'Data Grid', icon: 'table' },
                { id: 'strategy', label: 'Strategic Path', icon: 'target' },
            ];

            useEffect(() => {
                let timer;
                if (isAutoRotating) {
                    timer = setInterval(() => {
                        setProgress((prev) => {
                            if (prev >= 100) {
                                setActiveSection((curr) => (curr + 1) % sections.length);
                                return 0;
                            }
                            return prev + 1;
                        });
                    }, 100);
                }
                return () => clearInterval(timer);
            }, [isAutoRotating]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const stats = useMemo(() => {
                const totalConf = DIST_DATA.reduce((acc, curr) => acc + curr.conf, 0);
                const totalTarget = DIST_DATA.reduce((acc, curr) => acc + curr.mt, 0);
                const avgAchievement = (totalConf / totalTarget) * 100;
                return { totalConf, totalTarget, avgAchievement };
            }, []);

            const tierData = useMemo(() => {
                let excellent = 0, onTrack = 0, moderate = 0, critical = 0;
                DIST_DATA.forEach(d => {
                    const ach = (d.conf / d.mt) * 100;
                    if (ach >= 40) excellent++;
                    else if (ach >= 25) onTrack++;
                    else if (ach >= 15) moderate++;
                    else critical++;
                });
                return [
                    { name: 'Excellent', value: excellent, color: COLORS.excellent },
                    { name: 'On Track', value: onTrack, color: COLORS.onTrack },
                    { name: 'Moderate', value: moderate, color: COLORS.moderate },
                    { name: 'Critical', value: critical, color: COLORS.critical },
                ];
            }, []);

            return (
                <div className="flex h-screen w-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-20 xl:w-24 2xl:w-32 glass-dark flex flex-col items-center py-12 gap-12 border-r border-white/5 z-50">
                        <div className="w-12 h-12 xl:w-14 2xl:w-20 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-500/20">
                            <Icon name="trending-up" className="w-8 h-8 text-white" />
                        </div>
                        
                        <nav className="flex-1 flex flex-col gap-8">
                            {sections.map((section, idx) => (
                                <button
                                    key={section.id}
                                    onClick={() => { setActiveSection(idx); setProgress(0); setIsAutoRotating(false); }}
                                    className={`p-4 rounded-2xl transition-all duration-500 group relative ${activeSection === idx ? "bg-blue-600 text-white" : "text-white/30 hover:text-white hover:bg-white/5"}`}
                                >
                                    <Icon name={section.icon} className="w-7 h-7" />
                                    <div className="absolute left-20 glass px-4 py-2 rounded-xl text-sm font-bold opacity-0 pointer-events-none transition-all group-hover:opacity-100 whitespace-nowrap">
                                        {section.label}
                                    </div>
                                </button>
                            ))}
                        </nav>

                        <button onClick={() => setIsAutoRotating(!isAutoRotating)} className={`p-4 rounded-2xl transition-all ${isAutoRotating ? "text-emerald-400 bg-emerald-400/10" : "text-white/20 bg-white/5"}`}>
                            <Icon name={isAutoRotating ? "pause" : "play"} className="w-7 h-7" />
                        </button>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative min-h-0">
                        <header className="h-24 xl:h-32 px-12 flex items-center justify-between z-40 border-b border-white/5">
                            <div>
                                <h1 className="text-2xl xl:text-3xl font-black tracking-tighter uppercase">OKCL Strategic Dashboard</h1>
                                <div className="flex items-center gap-4 mt-1">
                                    <span className="px-3 py-1 bg-white/10 rounded-lg text-xs font-bold text-white/60 uppercase tracking-widest">March 2026</span>
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    <span className="text-emerald-400/80 text-xs font-bold uppercase tracking-widest">Live System Status</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-12">
                                <div className="flex flex-col items-end">
                                    <p className="text-3xl xl:text-4xl font-mono font-bold text-white/90 text-glow-blue">
                                        {currentTime.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                    </p>
                                    <p className="text-white/30 text-sm font-medium uppercase tracking-widest">
                                        {currentTime.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}
                                    </p>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 p-12 relative overflow-hidden min-h-0">
                            {activeSection === 0 && (
                                <div className="grid grid-cols-12 grid-rows-6 gap-8 h-full">
                                    <div className="col-span-3 row-span-2">
                                        <StatCard label="Total Confirmed" value={stats.totalConf.toLocaleString()} subValue={`Target: ${stats.totalTarget.toLocaleString()}`} iconName="check-circle-2" trend={12.5} colorClass="text-emerald-400" />
                                    </div>
                                    <div className="col-span-3 row-span-2">
                                        <StatCard label="Achievement" value={stats.avgAchievement.toFixed(1) + '%'} subValue="Overall Performance" iconName="trending-up" trend={4.2} colorClass="text-blue-400" />
                                    </div>
                                    <div className="col-span-3 row-span-2">
                                        <StatCard label="Total Uploads" value="18,450" subValue="Pending Validation: 5,200" iconName="users" trend={-2.1} colorClass="text-purple-400" />
                                    </div>
                                    <div className="col-span-3 row-span-2">
                                        <StatCard label="Shortfall" value={(stats.totalTarget - stats.totalConf).toLocaleString()} subValue="Remaining for Goal" iconName="alert-circle" colorClass="text-rose-400" />
                                    </div>

                                    <div className="col-span-8 row-span-4 glass p-12 rounded-[3rem] flex flex-col min-h-0">
                                        <h3 className="text-3xl font-black mb-8">Monthly Target Tracking</h3>
                                        <div className="flex-1 min-h-0">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={DIST_DATA.slice(0, 10)}>
                                                    <defs>
                                                        <linearGradient id="colorConf" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.3}/>
                                                            <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                                                        </linearGradient>
                                                    </defs>
                                                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false} />
                                                    <XAxis dataKey="d" stroke="rgba(255,255,255,0.3)" fontSize={12} tickLine={false} axisLine={false} />
                                                    <YAxis stroke="rgba(255,255,255,0.3)" fontSize={12} tickLine={false} axisLine={false} />
                                                    <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: 'none', borderRadius: '12px' }} />
                                                    <Area type="monotone" dataKey="conf" stroke="#3b82f6" strokeWidth={4} fillOpacity={1} fill="url(#colorConf)" />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>

                                    <div className="col-span-4 row-span-4 glass p-12 rounded-[3rem] flex flex-col min-h-0">
                                        <h3 className="text-3xl font-black mb-8">Tier Distribution</h3>
                                        <div className="flex-1 min-h-0 relative">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={tierData} cx="50%" cy="50%" innerRadius="60%" outerRadius="90%" paddingAngle={8} dataKey="value">
                                                        {tierData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.color} stroke="none" />)}
                                                    </Pie>
                                                    <Tooltip />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeSection === 1 && (
                                <div className="flex flex-col h-full gap-8 min-h-0">
                                    <h2 className="text-4xl font-black tracking-tight text-glow-blue">Performance Analytics</h2>
                                    <div className="flex-1 glass p-12 rounded-[3rem] min-h-0">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={DIST_DATA.slice(0, 15)} layout="vertical">
                                                <XAxis type="number" hide />
                                                <YAxis dataKey="d" type="category" stroke="rgba(255,255,255,0.5)" fontSize={12} width={100} tickLine={false} axisLine={false} />
                                                <Tooltip cursor={{ fill: 'rgba(255,255,255,0.05)' }} contentStyle={{ backgroundColor: '#0f172a', border: 'none' }} />
                                                <Bar dataKey="conf" fill="#3b82f6" radius={[0, 10, 10, 0]} barSize={20} />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            )}

                            {activeSection === 2 && (
                                <div className="flex flex-col h-full gap-8 min-h-0">
                                    <h2 className="text-4xl font-black tracking-tight text-glow-blue">District Data Grid</h2>
                                    <div className="flex-1 glass rounded-[3rem] overflow-hidden flex flex-col min-h-0">
                                        <div className="bg-white/5 px-12 py-8 grid grid-cols-12 gap-8 text-white/40 text-sm font-black uppercase tracking-widest border-b border-white/10">
                                            <div className="col-span-4">District</div>
                                            <div className="col-span-2 text-center">Target</div>
                                            <div className="col-span-2 text-center">Confirmed</div>
                                            <div className="col-span-4 text-right">Achievement</div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                                            {DIST_DATA.map((d, i) => (
                                                <div key={d.d} className="px-12 py-6 grid grid-cols-12 gap-8 items-center border-b border-white/5 hover:bg-white/5 transition-all">
                                                    <div className="col-span-4 font-bold text-xl">{d.d}</div>
                                                    <div className="col-span-2 text-center font-mono">{d.mt}</div>
                                                    <div className="col-span-2 text-center font-mono text-blue-400">{d.conf}</div>
                                                    <div className="col-span-4 text-right font-black text-emerald-400">{(d.conf/d.mt*100).toFixed(1)}%</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeSection === 3 && (
                                <div className="flex flex-col h-full gap-8 min-h-0">
                                    <h2 className="text-4xl font-black tracking-tight text-glow-blue">Strategic Roadmap</h2>
                                    <div className="grid grid-cols-2 gap-8 flex-1 min-h-0">
                                        <div className="glass p-12 rounded-[3rem] flex flex-col">
                                            <h3 className="text-2xl font-black mb-8">Confirmation Trend</h3>
                                            <div className="flex-1 min-h-0">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <LineChart data={TREND_DATA}>
                                                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false} />
                                                        <XAxis dataKey="day" stroke="rgba(255,255,255,0.3)" fontSize={12} tickLine={false} axisLine={false} />
                                                        <YAxis stroke="rgba(255,255,255,0.3)" fontSize={12} tickLine={false} axisLine={false} />
                                                        <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: 'none' }} />
                                                        <Line type="monotone" dataKey="confirmed" stroke="#3b82f6" strokeWidth={4} dot={{ r: 6 }} />
                                                    </LineChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                        <div className="glass p-12 rounded-[3rem] flex flex-col">
                                            <h3 className="text-2xl font-black mb-8">Infrastructure Health</h3>
                                            <div className="space-y-8 overflow-y-auto custom-scrollbar pr-4">
                                                {ALC_DATA.map(alc => (
                                                    <div key={alc.id} className="bg-white/5 p-8 rounded-3xl border border-white/5">
                                                        <div className="flex justify-between items-start mb-4">
                                                            <h4 className="text-xl font-black">{alc.name}</h4>
                                                            <span className={`px-4 py-1 rounded-full text-xs font-bold uppercase ${alc.status === 'Active' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}`}>{alc.status}</span>
                                                        </div>
                                                        <div className="w-full h-3 bg-white/5 rounded-full overflow-hidden">
                                                            <div className="h-full bg-blue-500" style={{ width: alc.efficiency + '%' }}></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="h-2 w-full bg-white/5 absolute bottom-0 left-0">
                            {isAutoRotating && (
                                <div className="h-full bg-blue-600" style={{ width: progress + '%', transition: 'width 0.1s linear' }}></div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
